const plotEl=document.getElementById('plot');

const emptyMsg=document.getElementById('empty_msg');

const stMean=document.getElementById('st_mean');
const stOut=document.getElementById('st_outliers');
const dateFromEl=document.getElementById('date_from');
const dateToEl=document.getElementById('date_to');
const dateClearEl=document.getElementById('date_clear');
if(zonesPanel && window.matchMedia('(max-width:760px)').matches) zonesPanel.removeAttribute('open');
const PALETTE=['#1f77b4','#2ca02c','#d62728','#9467bd','#ff7f0e','#17becf','#8c564b','#e377c2','#7f7f7f','#bcbd22'];
const zones=[...new Set(DATA.map(d=>String(d.zone_text||'-').trim()||'-'))].sort((a,b)=>a.localeCompare(b));
const selectedZones=new Set(); // inicio: ninguna seleccionada
let lastTouchKey='';
let lastTouchAt=0;
function fmtMoney(n){ return Number.isFinite(n)?('$'+Math.round(n).toLocaleString('es-PA')):'-'; }
function fmtNum(n,d=2){ return Number.isFinite(n)?n.toFixed(d):'-'; }
function mean(nums){ if(!nums.length) return null; return nums.reduce((a,b)=>a+b,0)/nums.length; }
function quantile(sorted,q){ if(!sorted.length) return null; const p=(sorted.length-1)*q; const b=Math.floor(p), r=p-b; return sorted[b+1]!==undefined ? sorted[b]+(sorted[b+1]-sorted[b])*r : sorted[b]; }
function esc(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function toIsoDate(v){
  const s=String(v||'').trim();
  if(!s || s==='-') return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m=s.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{2,4})$/);
  if(!m) return '';
  const dd=m[1].padStart(2,'0');
  const mm=m[2].padStart(2,'0');
  const yy=(m[3].length===2?`20${m[3]}`:m[3]);
  return `${yy}-${mm}-${dd}`;
}
const zoneColor={}; zones.forEach((z,i)=>zoneColor[z]=PALETTE[i%PALETTE.length]);

function renderZoneList(){
  zoneList.innerHTML='';
  for(const z of zones){
    const b=document.createElement('button');
    b.type='button';
    b.className='zone-btn'+(selectedZones.has(z)?' active':'');
    b.innerHTML=`<span class="dot" style="background:${zoneColor[z]}"></span><span>${esc(z)}</span>`;
    b.onclick=()=>{
      if(selectedZones.has(z)) selectedZones.delete(z); else selectedZones.add(z);
      renderZoneList();
      renderPlot();
    };
    zoneList.appendChild(b);
  }
}

function showTip(ev, d){
  tipEl.innerHTML =
    `<b>${esc(d.ad_id||'-')}</b><br>`+
    `${esc(d.title||'-')}<br>`+
    `Zona: ${esc(d.zone||'-')}<br>`+
    `Área: ${fmtNum(Number(d.area),1)} m²<br>`+
    `Precio/m²: ${fmtMoney(Number(d.price_m2))}<br>`+
    `Precio total: ${fmtMoney(Number(d.price))}<br>`+
    `Puntaje: ${esc(String(d.score||'-'))}`;
  const r=plotEl.getBoundingClientRect();
  const w=tipEl.offsetWidth || 280;
  const h=tipEl.offsetHeight || 140;
  let left=(ev.clientX-r.left+14);
  let top=(ev.clientY-r.top+14);
  const maxLeft=Math.max(6, r.width - w - 6);
  const maxTop=Math.max(6, r.height - h - 6);
  left=Math.max(6, Math.min(left, maxLeft));
  top=Math.max(6, Math.min(top, maxTop));
  tipEl.style.left=left+'px';
  tipEl.style.top=top+'px';
  tipEl.style.display='block';
}

function hideTip(){ tipEl.style.display='none'; }

function renderPlot(){
  const df=(dateFromEl && dateFromEl.value)?dateFromEl.value:'';
  const dt=(dateToEl && dateToEl.value)?dateToEl.value:'';
  const base=DATA.filter(d=>{
    if(!selectedZones.has(String(d.zone_text||'-').trim()||'-')) return false;
    if(!Number.isFinite(Number(d.area_total)) || !Number.isFinite(Number(d.price_m2))) return false;
    if(df || dt){
      const pd=toIsoDate(d.published_at);
      if(!pd) return false;
      if(df && pd<df) return false;
      if(dt && pd>dt) return false;
    }
    return true;
  });
  if(!base.length){
    plotEl.innerHTML='';
    hideTip();
    emptyMsg.style.display='flex';
    stPoints.textContent='0';
    stMean.textContent='-';
    stOut.textContent='0';
    return;
  }
  emptyMsg.style.display='none';
  const yBase=base.map(d=>Number(d.price_m2)).sort((a,b)=>a-b);
  const med=quantile(yBase,0.5);
  const q1=quantile(yBase,0.25);
  const q3=quantile(yBase,0.75);
  let low=q1, high=q3;
  if(Number.isFinite(q1) && Number.isFinite(q3)){
    const iqr=Math.max(0,(q3-q1));
    if(iqr>0){
      low=q1-(1.5*iqr);
      high=q3+(1.5*iqr);
    } else {
      low=med*0.65;
      high=med*1.35;
    }
  }
  if(Number.isFinite(med)){
    low=Math.max(low, med*0.35);
    high=Math.min(high, med*2.50);
  }
  const visible=base.filter(d=>{
    const y=Number(d.price_m2);
    return Number.isFinite(y) && y>=low && y<=high;
  });
  const outliers=Math.max(0, base.length-visible.length);
  const ys=visible.map(d=>Number(d.price_m2));
  const xs=visible.map(d=>Number(d.area_total));
  const m=mean(ys);
  stPoints.textContent=String(visible.length);
  stMean.textContent=Number.isFinite(m)?fmtMoney(m):'-';
  stOut.textContent=String(outliers);
  const xmin=xs.length?Math.min(...xs):0;
  const xmax=xs.length?Math.max(...xs):1;
  const W=1200,H=700, padL=80,padR=20,padT=20,padB=70;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const minX=Number.isFinite(xmin)?xmin:0, maxX=Number.isFinite(xmax)?xmax:1;
  const minY=ys.length?Math.min(...ys):0, maxY=ys.length?Math.max(...ys):1;
  const dx=Math.max(1e-9, maxX-minX), dy=Math.max(1e-9, maxY-minY);
  const x0=minX-dx*0.05, x1=maxX+dx*0.05;
  const y0=Math.max(0,minY-dy*0.08), y1=maxY+dy*0.12;
  const sx=(v)=>padL+((v-x0)/(x1-x0))*plotW;
  const sy=(v)=>padT+plotH-((v-y0)/(y1-y0))*plotH;
  const gridColor='#ebf1f7';
  let out=`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`;
  for(let i=0;i<=6;i++) {
    const yy=padT + (plotH/6)*i;
    out += `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="${gridColor}" stroke-width="1"/>`;
    const yv = y1 - ((y1-y0)/6)*i;
    out += `<text x="${padL-10}" y="${yy+4}" text-anchor="end" font-size="11" fill="#5a6f84">$${Math.round(yv).toLocaleString('es-PA')}</text>`;
  }
  for(let i=0;i<=8;i++) {
    const xx=padL + (plotW/8)*i;
    out += `<line x1="${xx}" y1="${padT}" x2="${xx}" y2="${H-padB}" stroke="${gridColor}" stroke-width="1"/>`;
    const xv = x0 + ((x1-x0)/8)*i;
    out += `<text x="${xx}" y="${H-padB+20}" text-anchor="middle" font-size="11" fill="#5a6f84">${Math.round(xv).toLocaleString('es-PA')}</text>`;
  }
  out += `<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#8aa1b8" stroke-width="1.2"/>`;
  out += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#8aa1b8" stroke-width="1.2"/>`;
  out += `<text x="${padL + plotW/2}" y="${H-20}" text-anchor="middle" font-size="13" fill="#263b50">Área total (m²)</text>`;
  out += `<text x="20" y="${padT + plotH/2}" transform="rotate(-90 20 ${padT + plotH/2})" text-anchor="middle" font-size="13" fill="#263b50">Precio / m² (USD)</text>`;
  if(Number.isFinite(m)){
    const yMean=sy(m), yLow=sy(m*0.9), yHigh=sy(m*1.1);
    out += `<line x1="${padL}" y1="${yLow}" x2="${W-padR}" y2="${yLow}" stroke="#999" stroke-dasharray="5 5" stroke-width="1"/>`;
    out += `<line x1="${padL}" y1="${yHigh}" x2="${W-padR}" y2="${yHigh}" stroke="#999" stroke-dasharray="5 5" stroke-width="1"/>`;
    out += `<line x1="${padL}" y1="${yMean}" x2="${W-padR}" y2="${yMean}" stroke="#111" stroke-dasharray="7 5" stroke-width="2"/>`;
  }
  for(const d of visible){
    const z=(String(d.zone_text||'-').trim()||'-');
    const cx=sx(Number(d.area_total)), cy=sy(Number(d.price_m2));
    const stroke='#2f4458';
    const scoreN=Number(d.score_total);
    let r=5.5; // score 70 => radio actual
    if(Number.isFinite(scoreN)){
      r = 5.5 + ((scoreN - 70) * 0.08);
    }
    r = Math.max(4.0, Math.min(9.0, r));
    const key=String(d.ad_id||'');
    const payload=encodeURIComponent(JSON.stringify({
      key:key, url:d.url, ad_id:d.ad_id, title:d.title_raw, zone:z, area:d.area_total, price_m2:d.price_m2, price:d.price_total, score:d.score_total
    }));
    out += `<circle class="pt" data-j="${payload}" cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="${r.toFixed(2)}" fill="${zoneColor[z]||'#1f77b4'}" stroke="${stroke}" stroke-width="1.6" style="cursor:pointer"/>`;
  }
  plotEl.innerHTML=out;
  for(const el of plotEl.querySelectorAll('.pt')) {
    const parseD=()=>JSON.parse(decodeURIComponent(el.getAttribute('data-j')||''));
    el.addEventListener('mouseenter', (ev)=>{ showTip(ev, parseD()); });
    el.addEventListener('mousemove', (ev)=>{ if(tipEl.style.display==='block') showTip(ev, parseD()); });
    el.addEventListener('mouseleave', ()=>hideTip());
    el.addEventListener('click', (ev)=>{
      const d=parseD();
      if(d.url && d.url!=='-') window.open(d.url,'_blank');
    });
    el.addEventListener('pointerdown', (ev)=>{
      const d=parseD();
      if(ev.pointerType==='touch'){
        showTip(ev, d);
        const now=Date.now();
        if(lastTouchKey===d.key && (now-lastTouchAt)<900) {
          if(d.url && d.url!=='-') window.open(d.url,'_blank');
        }
        lastTouchKey=d.key;
        lastTouchAt=now;
      }
    });
  }
}

document.getElementById('select_none').addEventListener('click',()=>{ selectedZones.clear(); renderZoneList(); renderPlot(); });
document.getElementById('select_all').addEventListener('click',()=>{ selectedZones.clear(); zones.forEach(z=>selectedZones.add(z)); renderZoneList(); renderPlot(); });
document.getElementById('reset_zones').addEventListener('click',()=>{ selectedZones.clear(); renderZoneList(); renderPlot(); });
if(dateFromEl) dateFromEl.addEventListener('input', renderPlot);
if(dateToEl) dateToEl.addEventListener('input', renderPlot);
if(dateClearEl) dateClearEl.addEventListener('click', ()=>{ if(dateFromEl) dateFromEl.value=''; if(dateToEl) dateToEl.value=''; renderPlot(); });

renderZoneList();
renderPlot();
</script>
